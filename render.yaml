services:
  - type: web
    name: filadelfia-whatsapp-backend
    runtime: node
    plan: free
    region: virginia
    rootDir: backend
    branch: main
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: WHATSAPP_BOT_ENABLED
        value: false
      - key: WHATSAPP_SESSION_DIR
        value: .session/baileys
      - key: WHATSAPP_IGNORE_GROUPS
        value: true
      - key: WHATSAPP_MIN_REPLY_INTERVAL_MS
        value: 60000
